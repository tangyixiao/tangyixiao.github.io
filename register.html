<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>注册 · 唐一笑的工坊</title>
  <!-- Font Awesome 图标库 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ===== 全局变量与重置 ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-gradient: linear-gradient(145deg, #f0f5fa 0%, #e2ebf3 100%);
      --card-bg: rgba(255, 255, 255, 0.7);
      --card-border: 1px solid rgba(255, 255, 255, 0.5);
      --text-primary: #1a2c44;
      --text-secondary: #3f5b7a;
      --accent: #3b71ca;
      --accent-light: #6a9cf0;
      --accent-soft: #e7f0fd;
      --input-bg: rgba(255, 255, 255, 0.6);
      --input-border: rgba(80, 110, 150, 0.15);
      --error-color: #d14545;
      --shadow-lg: 0 25px 40px -15px rgba(0, 20, 40, 0.2);
      --glow-accent: 0 0 0 3px rgba(59, 113, 202, 0.25);
    }

    /* 深色模式变量 */
    body.dark {
      --bg-gradient: linear-gradient(145deg, #0f1a26 0%, #192837 100%);
      --card-bg: rgba(25, 38, 55, 0.8);
      --card-border: 1px solid rgba(255, 255, 255, 0.06);
      --text-primary: #e9f0fc;
      --text-secondary: #b8cef0;
      --accent: #5f9eff;
      --accent-light: #8ab2ff;
      --accent-soft: #1f314a;
      --input-bg: rgba(18, 30, 45, 0.7);
      --input-border: rgba(140, 180, 255, 0.12);
      --error-color: #ff7b7b;
      --shadow-lg: 0 25px 40px -12px #00000060;
      --glow-accent: 0 0 0 3px rgba(95, 158, 255, 0.3);
    }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', system-ui, sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--text-primary);
      transition: background 0.3s, color 0.2s;
      line-height: 1.5;
    }

    /* 主卡片 —— 毛玻璃升级版 */
    .register-card {
      max-width: 480px;
      width: 100%;
      background: var(--card-bg);
      backdrop-filter: blur(18px) saturate(200%);
      -webkit-backdrop-filter: blur(18px) saturate(200%);
      border: var(--card-border);
      border-radius: 44px;
      box-shadow: var(--shadow-lg), inset 0 0 0 1px rgba(255,255,255,0.1);
      padding: 40px 36px;
      transition: all 0.25s;
    }

    /* 头部装饰 */
    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
    }
    .icon-badge {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent), #8fb5ff);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 20px -8px rgba(30, 70, 130, 0.3);
      color: white;
      font-size: 28px;
      border: 2px solid rgba(255,255,255,0.4);
    }
    h2 {
      font-weight: 650;
      font-size: 2.2rem;
      letter-spacing: -0.02em;
      background: linear-gradient(145deg, var(--text-primary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0;
      line-height: 1.2;
    }
    .subhead {
      color: var(--text-secondary);
      margin-bottom: 30px;
      font-size: 1rem;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 输入组 —— 精致化 */
    .input-group {
      margin-bottom: 24px;
      position: relative;
    }
    .input-group label {
      display: block;
      margin-bottom: 10px;
      font-weight: 550;
      font-size: 0.95rem;
      color: var(--text-secondary);
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .input-group label i {
      width: 20px;
      color: var(--accent);
      font-size: 1.1rem;
    }
    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-wrapper i.input-icon {
      position: absolute;
      left: 18px;
      color: var(--text-secondary);
      opacity: 0.6;
      font-size: 1rem;
      pointer-events: none;
      transition: 0.2s;
    }
    .input-group input {
      width: 100%;
      padding: 16px 20px 16px 52px;
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: 48px;
      font-size: 1rem;
      color: var(--text-primary);
      outline: none;
      backdrop-filter: blur(5px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.02);
      transition: all 0.25s ease;
      font-weight: 450;
    }
    .input-group input:focus {
      border-color: var(--accent);
      box-shadow: var(--glow-accent), 0 6px 12px -6px rgba(0,0,0,0.1);
      background: var(--card-bg);
    }
    .input-group input:focus + i.input-icon {
      color: var(--accent);
      opacity: 1;
    }
    /* 密码可见切换 (简单装饰，功能可后续加) */
    .password-toggle {
      position: absolute;
      right: 20px;
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      opacity: 0.6;
      transition: 0.2s;
      font-size: 1.2rem;
    }
    .password-toggle:hover {
      opacity: 1;
      color: var(--accent);
    }

    /* 错误提示区域 */
    .error-message {
      min-height: 28px;
      margin: 8px 0 4px;
      color: var(--error-color);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
      padding-left: 8px;
    }

    /* 注册按钮 —— 炫彩渐变 */
    .btn-register {
      width: 100%;
      padding: 16px 20px;
      background: linear-gradient(135deg, var(--accent), #4f8df5);
      border: none;
      border-radius: 60px;
      color: white;
      font-size: 1.2rem;
      font-weight: 650;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 0 12px 24px -8px rgba(59, 113, 202, 0.4);
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      margin-top: 16px;
    }
    .btn-register i {
      font-size: 1.2rem;
      transition: transform 0.2s;
    }
    .btn-register:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 30px -8px #1e4b9e60;
      background: linear-gradient(135deg, #4f8df5, #3b71ca);
    }
    .btn-register:hover i {
      transform: translateX(4px);
    }

    /* 底部链接 */
    .footer-links {
      margin-top: 28px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.95rem;
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .footer-links a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1.5px dotted transparent;
      transition: 0.2s;
      padding-bottom: 2px;
    }
    .footer-links a:hover {
      border-bottom-color: var(--accent);
      color: var(--accent-light);
    }
    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 22px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.95rem;
      opacity: 0.8;
      transition: 0.2s;
    }
    .back-home:hover {
      opacity: 1;
      color: var(--accent);
    }

    /* 响应式 */
    @media (max-width: 500px) {
      .register-card { padding: 30px 22px; border-radius: 36px; }
      h2 { font-size: 1.9rem; }
    }

    /* 加载动画 (可选) */
    .btn-register.loading {
      pointer-events: none;
      opacity: 0.8;
    }
    .fa-spinner {
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="register-card">
  <div class="card-header">
    <div class="icon-badge">
      <i class="fas fa-user-plus"></i>
    </div>
    <h2>创建账号</h2>
  </div>
  <div class="subhead">
    <i class="fas fa-gamepad" style="opacity: 0.7;"></i>
    <span>加入唐一笑的游戏宇宙，同步你的进度</span>
  </div>

  <form id="registerForm">
    <!-- 用户名 -->
    <div class="input-group">
      <label><i class="fas fa-user-astronaut"></i> 用户名</label>
      <div class="input-wrapper">
        <i class="fas fa-user input-icon"></i>
        <input type="text" id="regUsername" placeholder="例如: GameMaster" autocomplete="off" required>
      </div>
    </div>

    <!-- 邮箱 -->
    <div class="input-group">
      <label><i class="fas fa-envelope"></i> 电子邮箱</label>
      <div class="input-wrapper">
        <i class="fas fa-at input-icon"></i>
        <input type="email" id="regEmail" placeholder="your@email.com" autocomplete="email" required>
      </div>
    </div>

    <!-- 密码 -->
    <div class="input-group">
      <label><i class="fas fa-lock"></i> 密码</label>
      <div class="input-wrapper">
        <i class="fas fa-key input-icon"></i>
        <input type="password" id="regPassword" placeholder="至少6位" required>
        <button type="button" class="password-toggle" id="togglePassword1" tabindex="-1">
          <i class="far fa-eye"></i>
        </button>
      </div>
    </div>

    <!-- 确认密码 -->
    <div class="input-group">
      <label><i class="fas fa-check-circle"></i> 确认密码</label>
      <div class="input-wrapper">
        <i class="fas fa-shield input-icon"></i>
        <input type="password" id="regConfirm" placeholder="再次输入密码" required>
        <button type="button" class="password-toggle" id="togglePassword2" tabindex="-1">
          <i class="far fa-eye"></i>
        </button>
      </div>
    </div>

    <!-- 错误信息显示区 -->
    <div class="error-message" id="regError">
      <!-- 动态显示错误 -->
    </div>

    <button type="submit" class="btn-register" id="submitBtn">
      <i class="fas fa-arrow-right"></i> 立即注册
    </button>
  </form>

  <div class="footer-links">
    <a href="login.html"><i class="fas fa-sign-in-alt"></i> 已有账号？登录</a>
  </div>
  <a href="index.html" class="back-home">
    <i class="fas fa-arrow-left"></i> 返回作品集首页
  </a>
</div>

<!-- 引入共享的 auth.js (需与之前一致) -->
<script src="auth.js"></script>
<script>
  (function() {
    // 深色模式同步（若主页已设置主题，保持统一）
    const savedTheme = localStorage.getItem('tangyixiao-theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark');
    }

    // 密码可见切换 (简易交互)
    function setupPasswordToggle(btnId, inputId) {
      const btn = document.getElementById(btnId);
      const input = document.getElementById(inputId);
      if (!btn || !input) return;
      btn.addEventListener('click', () => {
        const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
        input.setAttribute('type', type);
        const icon = btn.querySelector('i');
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
      });
    }
    setupPasswordToggle('togglePassword1', 'regPassword');
    setupPasswordToggle('togglePassword2', 'regConfirm');

    const form = document.getElementById('registerForm');
    const errorDiv = document.getElementById('regError');
    const submitBtn = document.getElementById('submitBtn');

    // 实时清除错误（简单优化）
    const inputs = ['regUsername', 'regEmail', 'regPassword', 'regConfirm'];
    inputs.forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        errorDiv.innerHTML = '';
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('regUsername').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirm').value;

      // 前端校验
      if (!/^[a-zA-Z0-9_\u4e00-\u9fa5]{3,16}$/.test(username)) {
        errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> 用户名需为3-16位（字母/数字/中文/下划线）';
        return;
      }
      if (!email.includes('@') || email.length < 5) {
        errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> 请输入有效的电子邮箱';
        return;
      }
      if (password.length < 6) {
        errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> 密码长度至少6位';
        return;
      }
      if (password !== confirm) {
        errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> 两次输入的密码不一致';
        return;
      }

      // 显示加载状态
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 注册中...';
      submitBtn.classList.add('loading');

      try {
        // 调用 auth.js 中的注册方法 (确保已加载)
        if (typeof Auth === 'undefined') {
          throw new Error('认证模块未加载，请刷新');
        }
        const result = await Auth.register(username, email, password);
        
        if (result.success) {
          errorDiv.innerHTML = '<i class="fas fa-check-circle" style="color: #2e9a5e;"></i> 注册成功！正在跳转...';
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 1200);
        } else {
          throw new Error(result.message || '注册失败');
        }
      } catch (err) {
        errorDiv.innerHTML = `<i class="fas fa-times-circle"></i> ${err.message}`;
        submitBtn.innerHTML = originalText;
        submitBtn.classList.remove('loading');
      }
    });

    // 如果用户从深色模式主页跳转过来，保持主题一致；同时可以监听storage变化（可选）
  })();
</script>
<!-- 确保与主页共用同一套主题存储键 -->
</body>
</html>
