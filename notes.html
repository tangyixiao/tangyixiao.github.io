<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>笔记 · 唐一笑的工坊</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ===== 复用全局毛玻璃变量（与主页一致） ===== */
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg-gradient: linear-gradient(145deg, #f0f5fa 0%, #e2ebf3 100%);
      --card-bg: rgba(255, 255, 255, 0.7);
      --text-primary: #1a2c44;
      --text-secondary: #3f5b7a;
      --accent: #3b71ca;
      --accent-soft: #e7f0fd;
      --border-light: rgba(60,80,120,0.08);
      --shadow-lg: 0 20px 40px -12px rgba(0,20,40,0.15);
    }
    body.dark {
      --bg-gradient: linear-gradient(145deg, #0f1a26 0%, #192837 100%);
      --card-bg: rgba(25, 38, 55, 0.8);
      --text-primary: #e9f0fc;
      --text-secondary: #b8cef0;
      --accent: #5f9eff;
      --accent-soft: #1f314a;
      --border-light: rgba(200,220,255,0.08);
    }
    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      padding: 20px;
      color: var(--text-primary);
      transition: background 0.3s;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: var(--card-bg);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 40px;
      padding: 30px 28px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border-light);
    }
    /* 头部导航 */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 28px;
    }
    .header h1 {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 650;
      font-size: 2rem;
      color: var(--text-primary);
    }
    .actions {
      display: flex;
      gap: 12px;
    }
    .btn {
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(4px);
      border: 1px solid var(--border-light);
      border-radius: 40px;
      padding: 12px 20px;
      color: var(--text-primary);
      text-decoration: none;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
      transition: all 0.2s;
      cursor: pointer;
    }
    .btn:hover {
      background: var(--accent-soft);
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
    }
    /* 筛选标签 */
    .filter-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .filter-tab {
      padding: 8px 18px;
      border-radius: 30px;
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-secondary);
      cursor: pointer;
      transition: 0.2s;
    }
    .filter-tab.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    /* 笔记网格 */
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 10px;
    }
    .note-card {
      background: var(--card-bg);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border-light);
      border-radius: 24px;
      padding: 20px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 18px -6px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
    }
    .note-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 28px -10px rgba(0,0,0,0.1);
    }
    .note-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .note-title {
      font-size: 1.3rem;
      font-weight: 650;
      color: var(--text-primary);
      word-break: break-word;
    }
    .note-badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--accent-soft);
      color: var(--accent);
    }
    .note-content {
      color: var(--text-secondary);
      line-height: 1.5;
      flex: 1;
      margin-bottom: 16px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .note-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: var(--text-secondary);
      opacity: 0.8;
      border-top: 1px dashed var(--border-light);
      padding-top: 12px;
    }
    .note-actions i {
      margin-left: 12px;
      cursor: pointer;
      opacity: 0.6;
      transition: 0.2s;
    }
    .note-actions i:hover { opacity: 1; color: var(--accent); }
    .empty-notes {
      grid-column: 1/-1;
      text-align: center;
      padding: 50px;
      color: var(--text-secondary);
    }
    /* 模态框 */
    .modal-overlay {
      position: fixed;
      top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }
    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }
    .modal {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border-radius: 36px;
      padding: 32px;
      width: 90%;
      max-width: 550px;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid var(--border-light);
      box-shadow: 0 30px 50px -20px black;
    }
    .modal h2 { margin-bottom: 20px; }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .input-group input, .input-group textarea {
      width: 100%;
      padding: 14px 18px;
      background: var(--input-bg, rgba(255,255,255,0.5));
      border: 1px solid var(--border-light);
      border-radius: 28px;
      font-size: 1rem;
      color: var(--text-primary);
      outline: none;
    }
    .input-group textarea {
      min-height: 150px;
      resize: vertical;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 24px;
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><i class="fas fa-pen-fancy" style="color:var(--accent);"></i> 灵感笔记</h1>
    <div class="actions">
      <button class="btn" id="newNoteBtn"><i class="fas fa-plus-circle"></i> 新建笔记</button>
      <a href="index.html" class="btn"><i class="fas fa-home"></i> 返回主页</a>
    </div>
  </div>

  <!-- 筛选标签 -->
  <div class="filter-tabs">
    <div class="filter-tab active" data-filter="all">全部</div>
    <div class="filter-tab" data-filter="public">公开笔记</div>
    <div class="filter-tab" data-filter="mine">我的笔记</div>
  </div>

  <!-- 笔记展示区 -->
  <div id="notesContainer" class="notes-grid">
    <div class="empty-notes"><i class="fas fa-book-open"></i> 加载中...</div>
  </div>
</div>

<!-- 新建/编辑笔记模态框 -->
<div class="modal-overlay" id="noteModal">
  <div class="modal">
    <h2 id="modalTitle">新建笔记</h2>
    <form id="noteForm">
      <input type="hidden" id="noteId" value="">
      <div class="input-group">
        <label>标题</label>
        <input type="text" id="noteTitle" placeholder="笔记标题" required>
      </div>
      <div class="input-group">
        <label>内容 <span style="font-weight:normal;">(支持 Markdown)</span></label>
        <textarea id="noteContent" placeholder="写下你的想法..."></textarea>
      </div>
      <div class="input-group" style="display:flex; align-items:center; gap:12px;">
        <label style="margin-bottom:0;"><i class="fas fa-globe"></i> 公开笔记</label>
        <input type="checkbox" id="noteIsPublic" style="width:20px; height:20px;">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn" id="cancelModalBtn">取消</button>
        <button type="submit" class="btn btn-primary">保存</button>
      </div>
    </form>
  </div>
</div>

<script src="auth.js"></script>
<script>
  (function(){
    // ---------- 配置 ----------
    const WORKER_BASE = 'https://你的worker域名'; // 替换为实际 Worker URL
    const NOTES_API = WORKER_BASE + '/api/notes';
    
    // 当前用户
    let currentUser = Auth.getCurrentUser();
    
    // 所有笔记数据
    let allNotes = [];
    let currentFilter = 'all';
    
    // DOM 元素
    const container = document.getElementById('notesContainer');
    const modal = document.getElementById('noteModal');
    const modalTitle = document.getElementById('modalTitle');
    const noteForm = document.getElementById('noteForm');
    const noteIdInput = document.getElementById('noteId');
    const titleInput = document.getElementById('noteTitle');
    const contentInput = document.getElementById('noteContent');
    const isPublicCheck = document.getElementById('noteIsPublic');
    const cancelBtn = document.getElementById('cancelModalBtn');
    const newBtn = document.getElementById('newNoteBtn');
    const filterTabs = document.querySelectorAll('.filter-tab');
    
    // 深色模式同步
    if (localStorage.getItem('tangyixiao-theme') === 'dark') {
      document.body.classList.add('dark');
    }
    
    // ---------- 工具函数 ----------
    function formatDate(isoString) {
      const date = new Date(isoString);
      return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    }
    
    // 过滤笔记
    function filterNotes() {
      if (!currentUser) {
        // 未登录只显示公开笔记
        return allNotes.filter(n => n.isPublic);
      }
      if (currentFilter === 'public') {
        return allNotes.filter(n => n.isPublic);
      } else if (currentFilter === 'mine') {
        return allNotes.filter(n => n.author === currentUser.username);
      }
      return allNotes; // 'all'
    }
    
    // 渲染笔记
    function renderNotes() {
      const filtered = filterNotes();
      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-notes"><i class="fas fa-pencil"></i> 暂无笔记，点击“新建笔记”开始记录吧！</div>`;
        return;
      }
      let html = '';
      filtered.forEach(note => {
        const isAuthor = currentUser && note.author === currentUser.username;
        const publicBadge = note.isPublic ? '<span class="note-badge"><i class="fas fa-globe"></i> 公开</span>' : '<span class="note-badge"><i class="fas fa-lock"></i> 私密</span>';
        html += `
          <div class="note-card" data-id="${note.id}">
            <div class="note-header">
              <div class="note-title">${escapeHtml(note.title) || '无标题'}</div>
              ${publicBadge}
            </div>
            <div class="note-content">${escapeHtml(note.content.substring(0, 200))}${note.content.length>200?'...':''}</div>
            <div class="note-meta">
              <span><i class="fas fa-user"></i> ${escapeHtml(note.author)} · ${formatDate(note.createdAt)}</span>
              <span class="note-actions">
                ${isAuthor ? `<i class="fas fa-edit" onclick="editNote('${note.id}')"></i>
                             <i class="fas fa-trash-alt" onclick="deleteNote('${note.id}')"></i>` : ''}
              </span>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
    }
    
    // 简单的转义
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // 加载所有笔记
    async function loadNotes() {
      try {
        const res = await fetch(NOTES_API);
        if (!res.ok) throw new Error('加载失败');
        allNotes = await res.json();
        renderNotes();
      } catch(e) {
        container.innerHTML = `<div class="empty-notes">加载笔记失败，请刷新重试</div>`;
      }
    }
    
    // 保存笔记（新增或更新）
    async function saveNote(noteData) {
      const method = noteData.id ? 'PUT' : 'POST';
      const url = noteData.id ? `${NOTES_API}/${noteData.id}` : NOTES_API;
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(noteData)
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.message || '保存失败');
      }
      return res.json();
    }
    
    // 删除笔记
    async function deleteNoteById(id) {
      const res = await fetch(`${NOTES_API}/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error('删除失败');
    }
    
    // 打开模态框（新建/编辑）
    function openModal(note = null) {
      if (!currentUser) {
        alert('请先登录才能创建笔记');
        window.location.href = 'login.html';
        return;
      }
      modal.classList.add('active');
      if (note) {
        modalTitle.textContent = '编辑笔记';
        noteIdInput.value = note.id;
        titleInput.value = note.title;
        contentInput.value = note.content;
        isPublicCheck.checked = note.isPublic;
      } else {
        modalTitle.textContent = '新建笔记';
        noteIdInput.value = '';
        titleInput.value = '';
        contentInput.value = '';
        isPublicCheck.checked = true; // 默认公开
      }
    }
    
    function closeModal() {
      modal.classList.remove('active');
    }
    
    // 全局编辑/删除函数（供onclick调用）
    window.editNote = (id) => {
      const note = allNotes.find(n => n.id === id);
      if (note) openModal(note);
    };
    window.deleteNote = async (id) => {
      if (!confirm('确定删除这篇笔记吗？')) return;
      try {
        await deleteNoteById(id);
        await loadNotes();
      } catch(e) {
        alert('删除失败: ' + e.message);
      }
    };
    
    // ---------- 事件绑定 ----------
    newBtn.addEventListener('click', () => openModal());
    cancelBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });
    
    noteForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = noteIdInput.value;
      const title = titleInput.value.trim();
      const content = contentInput.value.trim();
      const isPublic = isPublicCheck.checked;
      
      if (!title) return alert('标题不能为空');
      
      const noteData = {
        title, content, isPublic,
        author: currentUser.username,
      };
      if (id) noteData.id = id;
      
      try {
        await saveNote(noteData);
        closeModal();
        await loadNotes();
      } catch(err) {
        alert('保存失败: ' + err.message);
      }
    });
    
    // 筛选切换
    filterTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        filterTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        renderNotes();
      });
    });
    
    // 初始化
    if (!currentUser) {
      // 未登录提示，但仍可浏览公开笔记
      console.log('未登录，仅显示公开笔记');
    }
    loadNotes();
    
    // 检查登录状态变化（简化）
    window.addEventListener('storage', (e) => {
      if (e.key === 'tangyixiao_user') {
        currentUser = Auth.getCurrentUser();
        loadNotes();
      }
    });
  })();
</script>
</body>
</html>
