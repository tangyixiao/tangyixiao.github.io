<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Double Pendulum | Chaotic Motion + Fading Trail</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Monaco', 'Menlo', 'Fira Code', monospace;
            padding: 20px;
        }

        .simulation-container {
            background: rgba(10, 14, 23, 0.6);
            border-radius: 2rem;
            padding: 1.2rem;
            backdrop-filter: blur(2px);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 1.5rem;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: filter 0.2s ease;
        }

        canvas:active {
            filter: brightness(0.98);
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.2rem;
            gap: 1.2rem;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            padding: 0.7rem 1.4rem;
            border-radius: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .title {
            font-weight: 500;
            letter-spacing: 1px;
            font-size: 0.85rem;
            color: #b9c7ff;
            text-shadow: 0 1px 2px black;
        }

        .title span {
            color: #ffaa66;
            font-weight: 600;
        }

        button {
            background: rgba(30, 35, 55, 0.9);
            border: none;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            color: #eef5ff;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        button:hover {
            background: #3c446e;
            color: white;
            transform: scale(0.96);
            box-shadow: 0 1px 3px black;
            border-color: rgba(255, 180, 100, 0.6);
        }

        .badge {
            font-size: 0.7rem;
            background: #00000055;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            color: #ccd9ff;
            font-family: monospace;
        }

        @keyframes subtle-pulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
<div>
    <div class="simulation-container">
        <canvas id="pendulumCanvas" width="900" height="600" style="width:100%; height:auto; max-width:900px; aspect-ratio:900/600"></canvas>
        <div class="info-panel">
            <div class="title">⚡ DOUBLE PENDULUM · <span>CHAOTIC DYNAMICS</span> · REAL GRAVITY (g = 9.8)</div>
            <div class="badge">✨ fading trail (second bob)</div>
            <button id="resetBtn">⟳ RESET MOTION</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // -------- REAL PHYSICS PARAMETERS (SI units) ----------
        const g = 9.8;                // gravity m/s²
        const m1 = 1.0;              // mass of first bob (kg)
        const m2 = 1.0;              // mass of second bob (kg)
        const L1_m = 1.2;            // length of first rod (meters)
        const L2_m = 1.0;            // length of second rod (meters)
        
        // drawing scale: meters -> pixels (visual scaling)
        const PX_PER_METER = 150;     // 1 meter = 150 pixels (fits canvas nicely)
        const L1_px = L1_m * PX_PER_METER;
        const L2_px = L2_m * PX_PER_METER;
        
        // canvas reference & context
        const canvas = document.getElementById('pendulumCanvas');
        const ctx = canvas.getContext('2d');
        
        // pivot point (fixed, center-top region)
        const pivotX = canvas.width / 2;
        const pivotY = 140;            // enough room below for full swing
        
        // ---------- STATE VARIABLES (angles in radians, angular velocity rad/s) ----------
        // initial condition: asymmetric & energetic -> chaotic motion
        let theta1 = Math.PI / 2 + 0.25;      // ~ 1.82 rad, right-leaning offset
        let theta2 = Math.PI / 2 - 0.35;      // different angle = chaotic asymmetry
        let omega1 = 0.0;                     // initial angular velocity
        let omega2 = 0.0;
        
        // Trail storage for SECOND BOB (fading effect)
        const MAX_TRAIL_LENGTH = 180;          // smooth long fading trail
        let trailPositions = [];               // stores { x, y } in canvas coordinates (second bob)
        
        // RK4 integration helpers
        // ------------------------------------------------------------
        // Equations of motion for double pendulum (Lagrangian mechanics)
        // using standard formulation: diff = theta1 - theta2
        // returns [ dtheta1/dt, dtheta2/dt, domega1/dt, domega2/dt ]
        function derivatives(theta1, theta2, omega1, omega2) {
            const diff = theta1 - theta2;
            const sinDiff = Math.sin(diff);
            const cosDiff = Math.cos(diff);
            const sinTheta1 = Math.sin(theta1);
            const sinTheta2 = Math.sin(theta2);
            
            // denominator (shared)
            const denom = m1 + m2 * sinDiff * sinDiff;
            
            // angular acceleration for theta1 (alpha1)
            const term1_num = m2 * g * sinTheta2 * cosDiff;
            const term2_num = -m2 * sinDiff * (L1_m * omega1 * omega1 * cosDiff + L2_m * omega2 * omega2);
            const term3_num = -(m1 + m2) * g * sinTheta1;
            const alpha1 = (term1_num + term2_num + term3_num) / (L1_m * denom);
            
            // angular acceleration for theta2 (alpha2)
            const termA = (m1 + m2) * (L1_m * omega1 * omega1 * sinDiff - g * sinTheta2 + g * sinTheta1 * cosDiff);
            const termB = m2 * L2_m * omega2 * omega2 * sinDiff * cosDiff;
            const alpha2 = (termA + termB) / (L2_m * denom);
            
            // derivatives: [ dθ1/dt , dθ2/dt , dω1/dt , dω2/dt ]
            return [omega1, omega2, alpha1, alpha2];
        }
        
        // Runge-Kutta 4 (RK4) integrator for high stability & realistic chaos
        function rk4Step(dt) {
            // current state vector
            let state = [theta1, theta2, omega1, omega2];
            
            function computeDeriv(s) {
                return derivatives(s[0], s[1], s[2], s[3]);
            }
            
            // k1
            const k1 = computeDeriv(state);
            // k2
            const state2 = [
                state[0] + 0.5 * dt * k1[0],
                state[1] + 0.5 * dt * k1[1],
                state[2] + 0.5 * dt * k1[2],
                state[3] + 0.5 * dt * k1[3]
            ];
            const k2 = computeDeriv(state2);
            // k3
            const state3 = [
                state[0] + 0.5 * dt * k2[0],
                state[1] + 0.5 * dt * k2[1],
                state[2] + 0.5 * dt * k2[2],
                state[3] + 0.5 * dt * k2[3]
            ];
            const k3 = computeDeriv(state3);
            // k4
            const state4 = [
                state[0] + dt * k3[0],
                state[1] + dt * k3[1],
                state[2] + dt * k3[2],
                state[3] + dt * k3[3]
            ];
            const k4 = computeDeriv(state4);
            
            // combine increments
            const newTheta1 = state[0] + dt * (k1[0] + 2*k2[0] + 2*k3[0] + k4[0]) / 6;
            const newTheta2 = state[1] + dt * (k1[1] + 2*k2[1] + 2*k3[1] + k4[1]) / 6;
            const newOmega1 = state[2] + dt * (k1[2] + 2*k2[2] + 2*k3[2] + k4[2]) / 6;
            const newOmega2 = state[3] + dt * (k1[3] + 2*k2[3] + 2*k3[3] + k4[3]) / 6;
            
            // update global state
            theta1 = newTheta1;
            theta2 = newTheta2;
            omega1 = newOmega1;
            omega2 = newOmega2;
        }
        
        // -------- compute bob positions (canvas coordinates) ----------
        function getBobPositions() {
            // first bob (relative to pivot)
            const x1 = pivotX + L1_px * Math.sin(theta1);
            const y1 = pivotY + L1_px * Math.cos(theta1);
            // second bob (relative to first bob)
            const x2 = x1 + L2_px * Math.sin(theta2);
            const y2 = y1 + L2_px * Math.cos(theta2);
            return { x1, y1, x2, y2 };
        }
        
        // -------- update fading trail (second bob only) ----------
        function updateTrail() {
            const { x2, y2 } = getBobPositions();
            // push current position of the SECOND bob
            trailPositions.push({ x: x2, y: y2 });
            // limit trail length
            while (trailPositions.length > MAX_TRAIL_LENGTH) {
                trailPositions.shift();
            }
        }
        
        // -------- DRAW EVERYTHING: pendulum + glowing fading trail ----------
        function draw() {
            if (!ctx) return;
            
            // clear canvas with deep dark space gradient background
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#0b1020');
            grad.addColorStop(1, '#0d1428');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // draw subtle reference grid (optional, adds depth)
            ctx.save();
            ctx.globalAlpha = 0.12;
            ctx.strokeStyle = '#88aaff';
            ctx.lineWidth = 0.6;
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
            ctx.restore();
            
            // ========== 1. DRAW FADING TRAIL FOR SECOND BOB ==========
            if (trailPositions.length > 1) {
                for (let i = 0; i < trailPositions.length; i++) {
                    const point = trailPositions[i];
                    // age factor: older points are more transparent & slightly smaller
                    const age = i / trailPositions.length;  // 0 = newest? let's define: i=0 oldest, i=length-1 newest
                    // reverse so that newest points are brightest
                    const freshness = (i + 1) / trailPositions.length;  // 0..1 (freshness)
                    // fading alpha: from 0.9 (recent) down to 0.08 (oldest)
                    const alpha = Math.pow(freshness, 1.5) * 0.68 + 0.08;
                    // dynamic color: warm orange-gold to red-purple fade
                    const hue = 25 + (1 - freshness) * 18;  // 25deg (orange) to 43deg (amber-red)
                    const sat = 85 + (1 - freshness) * 15;
                    const light = 65 + freshness * 20;
                    
                    ctx.beginPath();
                    // radius also fades: smaller for older points
                    const radius = 3.2 * freshness + 1.2;
                    ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${hue}, ${sat}%, ${light}%, ${alpha})`;
                    ctx.fill();
                    // add tiny glow for newer points
                    if (freshness > 0.65) {
                        ctx.shadowBlur = 5;
                        ctx.shadowColor = `rgba(255, 140, 50, ${alpha * 0.7})`;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    } else {
                        ctx.fill();
                    }
                }
                // also draw subtle connecting segments for the trail? adds "path" visual
                ctx.beginPath();
                ctx.lineWidth = 1.2;
                for (let i = 0; i < trailPositions.length - 1; i++) {
                    const p1 = trailPositions[i];
                    const p2 = trailPositions[i+1];
                    const freshness = (i + 1) / trailPositions.length;
                    const alphaLine = freshness * 0.35;
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.strokeStyle = `rgba(255, 170, 100, ${alphaLine * 0.6})`;
                    ctx.stroke();
                }
            }
            
            // ========== 2. DRAW PENDULUM ARMS & BOBS ==========
            const { x1, y1, x2, y2 } = getBobPositions();
            
            // draw glow effect (subtle)
            ctx.shadowBlur = 0;
            // --- rods (metallic appearance) ---
            ctx.beginPath();
            ctx.moveTo(pivotX, pivotY);
            ctx.lineTo(x1, y1);
            ctx.lineWidth = 3.5;
            ctx.strokeStyle = '#e9efff';
            ctx.shadowBlur = 4;
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.lineWidth = 3.0;
            ctx.strokeStyle = '#cfdcff';
            ctx.stroke();
            
            // pivot point (shiny)
            ctx.beginPath();
            ctx.arc(pivotX, pivotY, 8, 0, 2 * Math.PI);
            ctx.fillStyle = '#b8c7ff';
            ctx.shadowBlur = 5;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(pivotX, pivotY, 4, 0, 2 * Math.PI);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            
            // first bob (metallic copper)
            ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.arc(x1, y1, 13, 0, 2 * Math.PI);
            ctx.fillStyle = '#E0A878';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x1, y1, 9, 0, 2 * Math.PI);
            ctx.fillStyle = '#D68B5C';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x1, y1, 5, 0, 2 * Math.PI);
            ctx.fillStyle = '#FFCF9A';
            ctx.fill();
            
            // second bob (crimson / ember) - main attraction
            ctx.beginPath();
            ctx.arc(x2, y2, 12, 0, 2 * Math.PI);
            ctx.fillStyle = '#E8644A';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x2, y2, 8, 0, 2 * Math.PI);
            ctx.fillStyle = '#FF7F50';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x2, y2, 4.5, 0, 2 * Math.PI);
            ctx.fillStyle = '#FFAE7A';
            ctx.fill();
            
            // add inner highlight
            ctx.shadowBlur = 2;
            ctx.beginPath();
            ctx.arc(x2 - 1.5, y2 - 1.5, 2.2, 0, 2 * Math.PI);
            ctx.fillStyle = '#FFF9E0';
            ctx.fill();
            
            // reset shadow
            ctx.shadowBlur = 0;
            ctx.shadowColor = 'transparent';
            
            // additional tiny decorative stars on bobs (just aesthetics)
            ctx.fillStyle = '#FFDCA8';
            ctx.beginPath();
            ctx.arc(x1 - 2, y1 - 2, 1.5, 0, 2 * Math.PI);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x2 - 2, y2 - 2, 1.8, 0, 2 * Math.PI);
            ctx.fill();
        }
        
        // -------- RESET SIMULATION TO CHAOTIC STATE (clear trail) ----------
        function resetSimulation() {
            // set asymmetric initial condition for rich chaotic behavior
            theta1 = Math.PI / 2 + 0.31;     // ~1.88 rad
            theta2 = Math.PI / 2 - 0.52;     // ~1.05 rad (large delta)
            omega1 = 0.0;
            omega2 = 0.0;
            
            // optional: tiny random perturbation to emphasize chaos (micro realism)
            // but deterministic reset still produces beautiful chaos due to asymmetry
            // clear trail completely
            trailPositions = [];
            // immediately record first bob trail after reset (for continuity)
            setTimeout(() => {
                const { x2, y2 } = getBobPositions();
                trailPositions.push({ x: x2, y: y2 });
            }, 10);
        }
        
        // -------- ANIMATION LOOP (FIXED TIMESTEP, RK4 integration) ----------
        let lastTimestamp = 0;
        const TIME_STEP = 1 / 60;      // 60 FPS physics (smooth & stable)
        let accumulator = 0;
        
        function animate(currentTime) {
            requestAnimationFrame(animate);
            
            // delta time in seconds (with capping)
            let delta = Math.min(0.033, (currentTime - lastTimestamp) / 1000);
            if (delta <= 0 || !lastTimestamp) {
                lastTimestamp = currentTime;
                return;
            }
            lastTimestamp = currentTime;
            
            // fixed timestep integration for deterministic, smooth chaos
            accumulator += delta;
            while (accumulator >= TIME_STEP) {
                // perform RK4 step
                rk4Step(TIME_STEP);
                // update trail positions AFTER physics step (so trail follows real-time)
                updateTrail();
                accumulator -= TIME_STEP;
            }
            
            // draw everything (pendulum + fading trail)
            draw();
        }
        
        // -------- RESET BUTTON HANDLER + INIT TRAIL --------
        function initTrailFirstPositions() {
            trailPositions = [];
            // fill initial trail with duplicate positions to have soft start
            const { x2, y2 } = getBobPositions();
            for (let i = 0; i < 15; i++) {
                trailPositions.push({ x: x2, y: y2 });
            }
        }
        
        // event binding
        const resetBtn = document.getElementById('resetBtn');
        resetBtn.addEventListener('click', () => {
            resetSimulation();
            // fill initial trail with fresh starting point
            const { x2, y2 } = getBobPositions();
            trailPositions = [];
            for (let i = 0; i < 12; i++) {
                trailPositions.push({ x: x2, y: y2 });
            }
        });
        
        // optional: click on canvas also triggers a soft nudge (fun interactive chaos)
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;
            const { x2, y2 } = getBobPositions();
            // distance from second bob to click: add small angular impulse based on direction
            const dx = mouseX - x2;
            const dy = mouseY - y2;
            const dist = Math.hypot(dx, dy);
            if (dist < 70) {
                // give gentle energy kick: perturb angular velocities (chaotic response)
                const angleEffect = Math.atan2(dy, dx);
                const kickStrength = 1.3;
                omega1 += (Math.sin(angleEffect) * 0.55) * kickStrength;
                omega2 += (Math.cos(angleEffect) * 0.65) * kickStrength;
                // avoid extreme blowup (clamp subtle)
                omega1 = Math.min(5.0, Math.max(-5.0, omega1));
                omega2 = Math.min(6.0, Math.max(-6.0, omega2));
                // add extra visual flair: immediately push new trail point for fluidity
                updateTrail();
            }
        });
        
        // initialize simulation with proper starting trail and draw first frame
        resetSimulation();       // sets chaotic angles
        initTrailFirstPositions();  // smooth fading trail from start
        draw();                 // initial draw without motion
        
        // start animation loop
        lastTimestamp = performance.now();
        requestAnimationFrame(animate);
        
        // handle canvas resize / pixel ratio fine (already static size)
        // extra: window resize doesn't affect coordinate mapping, but canvas stays fixed
        window.addEventListener('resize', () => {
            draw();  // redraw on resize just to keep crisp visuals
        });
    })();
</script>
</body>
</html>
